name: Bug Report or Feature Request
description: Report a bug or suggest a feature
title: "[Bug/Feature] "
labels: ["triage"]
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Bug
        - Feature Request
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, or what do you want?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else helpful
